<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi cuenta | Cattaleya Joyería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/cuenta.css">
</head>
<body>
  <header class="header" id="header">
    <div class="header__inner">
      <a href="index.html" class="logo">Cattaleya</a>
      <nav class="nav" data-active="productos"></nav>
    </div>
  </header>

  <main style="padding-top: var(--header-height);">
    <div class="container" style="padding: var(--space-2xl) 0;">
      <div class="cuenta-box" id="cuenta-loggedout">
        <h1 class="page-title">Mi cuenta</h1>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
          <button class="auth-tab" data-tab="register">Registrarse</button>
        </div>
        <form class="auth-form" id="form-login">
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Contraseña" required>
          <button type="submit" class="btn btn--primary btn--block">Entrar</button>
        </form>
        <form class="auth-form" id="form-register" style="display: none;">
          <input type="text" placeholder="Nombre completo" required>
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Contraseña" required>
          <button type="submit" class="btn btn--primary btn--block">Crear cuenta</button>
        </form>
      </div>
      <div class="cuenta-box" id="cuenta-loggedin" style="display: none;">
        <h1 class="page-title">Hola, <span id="user-name"></span></h1>
        <p class="cuenta-info">Has iniciado sesión correctamente.</p>
        <a href="carrito.html" class="btn btn--outline">Ver carrito</a>
        <button class="btn btn--outline" id="btn-logout" style="margin-left: var(--space-md);">Cerrar sesión</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__bottom">
      <p>© 2025 Cattaleya Joyería. Av. Tecnológico #9 interior 2, Colima.</p>
    </div>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cuenta.js"></script>
</body>
</html>
