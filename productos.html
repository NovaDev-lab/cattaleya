<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo Cattaleya - Anillos, collares, aretes, pulseras. Joyería fina en plata y oro.">
  <title>Productos | Cattaleya Joyería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="header" id="header">
    <div class="header__inner">
      <a href="index.html" class="logo">Cattaleya</a>
      <nav class="nav" data-active="productos"></nav>
    </div>
  </header>

  <main class="main-content">
    <section class="section page-hero">
      <div class="container">
        <header class="section__header">
          <h1 class="section__title">Nuestra colección</h1>
          <p class="section__subtitle">Descubre piezas únicas elaboradas con los mejores materiales.</p>
        </header>
        <div class="categories-filter" id="categories-filter">
          <button class="category-btn active" data-category="todos">Todos</button>
          <button class="category-btn" data-category="anillos">Anillos</button>
          <button class="category-btn" data-category="collares">Collares</button>
          <button class="category-btn" data-category="aretes">Aretes</button>
          <button class="category-btn" data-category="pulseras">Pulseras</button>
        </div>
      </div>
    </section>

    <section class="section section--alt">
      <div class="container">
        <div class="products-grid" id="products-grid"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__grid">
      <div>
        <h3 class="footer__brand">Cattaleya</h3>
        <p class="footer__text">Joyería fina con diseño atemporal. Piezas únicas para momentos especiales.</p>
      </div>
      <div>
        <h4 class="footer__heading">Enlaces</h4>
        <nav class="footer__links">
          <a href="index.html" class="footer__link">Inicio</a>
          <a href="productos.html" class="footer__link">Productos</a>
          <a href="contacto.html" class="footer__link">Contacto</a>
        </nav>
      </div>
      <div>
        <h4 class="footer__heading">Síguenos</h4>
        <nav class="footer__links">
          <a href="https://instagram.com" target="_blank" rel="noopener" class="footer__link">Instagram</a>
          <a href="https://wa.me/5213121234567" target="_blank" rel="noopener" class="footer__link">WhatsApp</a>
        </nav>
      </div>
    </div>
    <div class="footer__bottom">
      <p>© 2025 Cattaleya Joyería. Av. Tecnológico #9, Colima.</p>
    </div>
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/productos.js"></script>
