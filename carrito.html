<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | Cattaleya Joyería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/carrito.css">
</head>
<body>
  <header class="header" id="header">
    <div class="header__inner">
      <a href="index.html" class="logo">Cattaleya</a>
      <nav class="nav" data-active="productos"></nav>
    </div>
  </header>

  <main style="padding-top: var(--header-height);">
    <div class="container" style="padding: var(--space-2xl) 0;">
      <h1 class="page-title">Tu carrito</h1>
      <div class="cart-layout">
        <div class="cart-items" id="cart-items">
          <p class="cart-empty" id="cart-empty">Tu carrito está vacío. <a href="productos.html">Explorar productos</a></p>
        </div>
        <aside class="cart-summary" id="cart-summary" style="display: none;">
          <h3>Resumen</h3>
          <div class="cart-summary__row">
            <span>Subtotal</span>
            <span id="cart-subtotal">$0 MXN</span>
          </div>
          <a href="checkout.html" class="btn btn--primary btn--block">Proceder al pago</a>
        </aside>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__grid">
      <div>
        <h3 class="footer__brand">Cattaleya</h3>
        <p class="footer__text">Joyería fina con diseño atemporal.</p>
      </div>
      <div>
        <nav class="footer__links">
          <a href="index.html" class="footer__link">Inicio</a>
          <a href="productos.html" class="footer__link">Productos</a>
          <a href="contacto.html" class="footer__link">Contacto</a>
        </nav>
      </div>
    </div>
    <div class="footer__bottom">
      <p>© 2025 Cattaleya Joyería. Av. Tecnológico #9 interior 2, Colima.</p>
    </div>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/carrito.js"></script>
</body>
</html>
